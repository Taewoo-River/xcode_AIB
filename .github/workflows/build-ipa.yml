name: Build AI Buddy IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      # The runner's default Xcode can lag behind — pick the newest installed
      # one so modern SDK frameworks (FoundationModels etc.) are available.
      - name: Select latest Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          echo "Selecting $LATEST"
          sudo xcode-select -s "$LATEST"
          xcodebuild -version

      - name: Download llama.cpp xcframework (Metal GPU engine)
        run: |
          curl -L -o llama-xcframework.zip \
            "https://github.com/ggml-org/llama.cpp/releases/download/b9957/llama-b9957-xcframework.zip"
          unzip -q llama-xcframework.zip
          mkdir -p vendor
          mv build-apple/llama.xcframework vendor/

      - name: Download sherpa-onnx xcframeworks (voice cloning engine)
        run: |
          curl -L -o sherpa-ios.tar.bz2 \
            "https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.13.4/sherpa-onnx-v1.13.4-ios.tar.bz2"
          tar xjf sherpa-ios.tar.bz2
          mv build-ios/sherpa-onnx.xcframework vendor/
          # onnxruntime.xcframework is nested under a version dir
          mv build-ios/ios-onnxruntime/*/onnxruntime.xcframework vendor/
          ls -la vendor/

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned — SideStore/Sideloadly sign it on install)
        run: |
          set -o pipefail
          # -quiet suppresses the verbose per-file command spam so real
          # warnings/errors are visible; tee keeps a full copy for the summary.
          xcodebuild \
            -project AIBuddy.xcodeproj \
            -scheme AIBuddy \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            -quiet \
            build 2>&1 | tee /tmp/xcodebuild.log

      - name: Show compiler errors on failure
        if: failure()
        run: |
          echo "===================== COMPILER ERRORS ====================="
          grep -nE "error:|cannot find|has no member|is unavailable|ambiguous|referencing" /tmp/xcodebuild.log | head -80 || true
          echo "==========================================================="

      - name: Package IPA
        run: |
          mkdir Payload
          cp -R build/Build/Products/Release-iphoneos/AIBuddy.app Payload/
          zip -qry AIBuddy.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIBuddy-ipa
          path: AIBuddy.ipa
          retention-days: 30
