# XcodeGen spec — GitHub Actions runs `xcodegen generate` to produce
# AIBuddy.xcodeproj from this file. https://github.com/yonaskolb/XcodeGen

name: AIBuddy

options:
  bundleIdPrefix: com.taewoo
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

# Voice cloning uses sherpa-onnx + ZipVoice (CPU, ONNX) — its two xcframeworks
# are downloaded/extracted into vendor/ by the CI workflow. SWCompression (pure
# Swift) unpacks the .tar.bz2 voice model on-device.
#
# The older swift-qwen3-tts (MLX) path is kept dormant behind
# #if canImport(Qwen3TTS): its transitive dep swift-transformers doesn't compile
# on Xcode 26.6 (a Jinja ObjectKey bug). To re-enable it later, add it back to
# `packages:` + the AIBuddy dependencies and bump iOS to 18.
packages:
  SWCompression:
    url: https://github.com/tsolomko/SWCompression.git
    from: "4.0.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "2.2"
    CURRENT_PROJECT_VERSION: "1"

targets:
  AIBuddy:
    type: application
    platform: iOS
    sources:
      - path: AIBuddy
    dependencies:
      # Official llama.cpp binary framework (Metal GPU inside) —
      # the CI workflow downloads it into vendor/ before generating.
      - framework: vendor/llama.xcframework
        embed: true
        codeSign: true
      # Screen-broadcast extension (live "look at my screen")
      - target: AIBuddyBroadcast
        embed: true
        codeSign: true
      # sherpa-onnx voice cloning: static lib (link, don't embed) + onnxruntime
      # dynamic framework (embed). Both extracted into vendor/ by CI.
      - framework: vendor/sherpa-onnx.xcframework
        embed: false
      - framework: vendor/onnxruntime.xcframework
        embed: true
        codeSign: true
      - package: SWCompression
        product: SWCompression
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.taewoo.aibuddy
        PRODUCT_NAME: AIBuddy
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        SUPPORTS_MACCATALYST: false
        # sherpa-onnx is C++; a pure-Swift app must explicitly link the C++ stdlib.
        SWIFT_OBJC_BRIDGING_HEADER: AIBuddy/Sherpa/Sherpa-Bridging-Header.h
        OTHER_LDFLAGS: "$(inherited) -lc++"
    info:
      path: AIBuddy/Info.plist
      properties:
        CFBundleDisplayName: AI Buddy
        UILaunchScreen: {}
        UIBackgroundModes:
          - audio
        UIRequiresFullScreen: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSMicrophoneUsageDescription: Talk to your AI buddy by voice.
        NSSpeechRecognitionUsageDescription: Turns your speech into text so the buddy can understand you.
        NSPhotoLibraryUsageDescription: Lets the buddy look at photos and your latest screenshot when you ask it to.
        NSLocalNetworkUsageDescription: Connect to Ollama running on your PC over Wi-Fi.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        ITSAppUsesNonExemptEncryption: false

  AIBuddyBroadcast:
    type: app-extension
    platform: iOS
    sources:
      - path: Broadcast
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.taewoo.aibuddy.broadcast
        PRODUCT_NAME: AIBuddyBroadcast
        SKIP_INSTALL: true
    info:
      path: Broadcast/Info.plist
      properties:
        CFBundleDisplayName: AI Buddy Screen
        NSExtension:
          NSExtensionPointIdentifier: com.apple.broadcast-services-upload
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).SampleHandler
          RPBroadcastProcessMode: RPBroadcastProcessModeSampleBuffer
